<!DOCTYPE html>
<!--
  PURAMENTE DANZA 2026 — Portal de inicio
  ----------------------------------------------------------------------
  Página de entrada: acá van todas las tarjetas/botones hacia cada
  sección del evento. El formulario de inscripción (inscripciones.html)
  es UNA de esas tarjetas, no esta página.

  ARCHIVOS QUE NECESITA ESTA PÁGINA (subilos junto con este HTML, en
  una carpeta llamada "assets" al lado de este archivo):
    assets/fondo-portal.jpg
    assets/logo-puramente.png
    assets/boton-inscripciones-competencia.jpg
    assets/boton-inscripciones-workshop.jpg
    assets/boton-reglamento.jpg
    assets/boton-orden-participacion.jpg
    assets/boton-devoluciones.jpg
    assets/boton-fotos.jpg

  CÓMO AGREGAR O CAMBIAR UN LINK
  ----------------------------------------------------------------------
  Todo el contenido de las tarjetas vive en el array SECCIONES, más abajo
  en el <script>. Para activar una tarjeta que todavía dice "Próximamente":
    1. Buscá su objeto en SECCIONES (por el "titulo").
    2. Completá "href" con el link real.
    3. Cambiá "disponible: false" por "disponible: true".
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puramente Danza 2026 — Portal</title>
<style>
  :root {
    --morado: #7B2FBE;
    --morado-oscuro: #4E1D7F;
    --marfil: #FBF8FF;
    --texto: #2B2432;
    --texto-suave: #6E6079;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--marfil);
    color: var(--texto);
  }

  /* ---------- Header: foto de fondo + logo ---------- */
  .encabezado {
    position: relative;
    overflow: hidden;
    min-height: 62vw;
    max-height: 560px;
    padding: 34px 24px 0;
    text-align: center;
    color: white;
  }
  .encabezado-fondo {
    position: absolute;
    inset: 0;
    background: url('assets/fondo-portal.jpg') center top / cover no-repeat;
  }
  .encabezado-degrade {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.15) 0%,
      rgba(120,60,170,0.05) 30%,
      rgba(78,29,127,0.55) 62%,
      rgba(53,19,79,0.92) 100%);
  }
  .marca {
    position: relative;
    z-index: 1;
  }
  .marca img {
    width: min(280px, 62vw);
    height: auto;
    filter: drop-shadow(0 2px 10px rgba(255,255,255,0.5));
  }
  .bienvenida {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 10px auto 0;
    font-size: 14px;
    line-height: 1.6;
    color: #FBF8FF;
    text-shadow: 0 1px 6px rgba(53,19,79,0.6);
  }

  /* ---------- Grilla de secciones ---------- */
  .grilla {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    max-width: 760px;
    margin: -13vw auto 0;
    padding: 0 18px 44px;
  }
  @media (min-width: 620px) {
    .grilla { grid-template-columns: repeat(3, 1fr); margin-top: -80px; }
  }
  @media (min-width: 920px) {
    .grilla { grid-template-columns: repeat(4, 1fr); max-width: 1040px; margin-top: -70px; }
  }

  .tarjeta {
    position: relative;
    display: block;
    aspect-ratio: 16 / 9;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 10px 22px rgba(53, 19, 79, 0.28);
    background: var(--morado-oscuro);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .tarjeta img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .tarjeta.disponible:hover,
  .tarjeta.disponible:focus-visible {
    transform: translateY(-4px);
    box-shadow: 0 16px 30px rgba(53, 19, 79, 0.38);
  }
  .tarjeta:focus-visible {
    outline: 2px solid #F0C078;
    outline-offset: 3px;
  }
  .tarjeta.proxima { cursor: default; }
  .tarjeta.proxima img {
    filter: grayscale(45%) brightness(0.8);
  }
  .insignia-proximamente {
    position: absolute;
    left: 50%;
    bottom: 8px;
    transform: translateX(-50%);
    padding: 3px 10px;
    font-size: 9.5px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    font-weight: 700;
    color: white;
    background: rgba(53, 19, 79, 0.75);
    border-radius: 999px;
    white-space: nowrap;
  }

  footer {
    text-align: center;
    font-size: 12px;
    color: var(--texto-suave);
    padding: 8px 20px 40px;
  }
  footer a { color: var(--morado); font-weight: 600; text-decoration: none; }
</style>
</head>
<body>

  <header class="encabezado">
    <div class="encabezado-fondo" aria-hidden="true"></div>
    <div class="encabezado-degrade" aria-hidden="true"></div>
    <div class="marca">
      <img src="assets/logo-puramente.png" alt="Puramente Danza">
    </div>
    <p class="bienvenida">
      Desde acá accedés a todo lo del evento: inscripciones, reglamento, orden de
      participación, devoluciones del jurado, fotos y las novedades oficiales.
    </p>
  </header>

  <main class="grilla" id="grilla" aria-label="Secciones del evento"></main>

  <footer>
    WhatsApp (0994) 445463 · <a href="mailto:puramentedanza@gmail.com">puramentedanza@gmail.com</a> · Instagram @puramentedanza
  </footer>

<script>
  // ---------- Secciones del portal ----------
  // "disponible: false" muestra la tarjeta apagada con la insignia "Próximamente".
  // Para activarla: completá "href" y poné "disponible: true".
  const SECCIONES = [
    {
      titulo: 'Inscripciones Competencia',
      imagen: 'assets/boton-inscripciones-competencia.jpg',
      href: 'inscripciones.html',
      disponible: true,
    },
    {
      titulo: 'Inscripciones Workshops',
      imagen: 'assets/boton-inscripciones-workshop.jpg',
      href: '',
      disponible: false,
    },
    {
      titulo: 'Reglamento',
      imagen: 'assets/boton-reglamento.jpg',
      href: 'https://drive.google.com/file/d/1uvSZQKz3zTl86dU8nqM8RjnDSQ6z7erl/view?usp=sharing',
      disponible: true,
    },
    {
      titulo: 'Orden de participación',
      imagen: 'assets/boton-orden-participacion.jpg',
      href: '',
      disponible: false,
    },
    {
      titulo: 'Portal de devoluciones',
      imagen: 'assets/boton-devoluciones.jpg',
      href: '',
      disponible: false,
    },
    {
      titulo: 'Fotos',
      imagen: 'assets/boton-fotos.jpg',
      href: '',
      disponible: false,
    },
  ];

  function crearTarjeta(seccion) {
    const disponible = seccion.disponible && seccion.href;
    const tag = disponible ? 'a' : 'div';
    const el = document.createElement(tag);
    el.className = `tarjeta ${disponible ? 'disponible' : 'proxima'}`;
    if (disponible) {
      el.href = seccion.href;
      if (seccion.href.startsWith('http')) {
        el.target = '_blank';
        el.rel = 'noopener';
      }
    } else {
      el.setAttribute('role', 'note');
      el.setAttribute('aria-disabled', 'true');
    }

    const etiqueta = disponible ? seccion.titulo : `${seccion.titulo} — próximamente`;
    el.innerHTML = `
      <img src="${seccion.imagen}" alt="${etiqueta}" loading="lazy">
      ${!disponible ? '<span class="insignia-proximamente">Próximamente</span>' : ''}
    `;
    return el;
  }

  const grilla = document.getElementById('grilla');
  SECCIONES.forEach(seccion => grilla.appendChild(crearTarjeta(seccion)));
</script>

</body>
</html>
